<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Persons Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h1 class="mb-4">Persons</h1>

    <div id="persons" class="mb-5"></div>

    <h2>Add / Edit Person</h2>

    <form id="personForm" class="row g-3">
        <!-- hidden field for editing -->
        <input type="hidden" id="personId">

        <div class="col-md-6">
            <input type="text" id="firstname" class="form-control" placeholder="First Name" required>
        </div>
        <div class="col-md-6">
            <input type="text" id="lastname" class="form-control" placeholder="Last Name" required>
        </div>
        <div class="col-md-6">
            <input type="date" id="birthdate" class="form-control" placeholder="Birthdate" required>
        </div>
        <div class="col-md-6">
            <input type="text" id="gender" class="form-control" placeholder="Gender (M/F)" maxlength="1" required>
        </div>
        <div class="col-md-6">
            <input type="date" id="firstRegistration" class="form-control" placeholder="First Registration" required>
        </div>
        <div class="col-md-6">
            <input type="text" id="celular" class="form-control" placeholder="Cellular" required>
        </div>
        <div class="col-md-6">
            <input type="email" id="email" class="form-control" placeholder="Email" required>
        </div>
        <div class="col-md-6">
            <input type="text" id="phone" class="form-control" placeholder="Phone" required>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary" id="submitBtn">Save</button>
            <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
        </div>
    </form>

    <script src="script.js"></script>

</body>
</html>
